name: Keep backend alive

on:
  schedule:
    # Every 10 minutes — Render free tier sleeps after 15 min of inactivity
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          curl -sf -o /dev/null -w "status: %{http_code}\n" https://my-route-backend.onrender.com/
